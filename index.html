<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Money Intercepter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="logo">💱 Global Money Intercepter</div>
    <p class="tagline">Your one-stop app for global money management</p>
  </header>

  <main>
    <section class="converter-card">
      <h2>Currency Converter</h2>
      <div class="converter-form">
        <div class="input-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" placeholder="Enter amount" value="1" min="0" step="any" />
        </div>
        <div class="input-group">
          <label for="from-currency">From</label>
          <select id="from-currency"></select>
        </div>
        <button id="swap-btn" title="Swap currencies">⇄</button>
        <div class="input-group">
          <label for="to-currency">To</label>
          <select id="to-currency"></select>
        </div>
      </div>
      <button id="convert-btn" class="primary-btn">Convert</button>
      <div id="result" class="result" aria-live="polite"></div>
    </section>

    <section class="rates-card">
      <h2>Popular Exchange Rates <span class="base-label">(base: USD)</span></h2>
      <ul id="rates-list" class="rates-list"></ul>
    </section>
  </main>

  <footer>
    <p>Powered by open exchange-rate data &mdash; rates are approximate</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
